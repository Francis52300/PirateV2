<body>

<!-- ========== CARTE D'INSTALLATION PWA (visible avant le jeu) ========== -->
<div id="pwa-install-card" style="

">

    <div style="flex:1;min-width:0">

      </p>
      <p id="pwa-install-desc" style="font-size:.78rem;opacity:.75;margin:0;line-height:1.4">

      </p>
    </div>
    <!-- Bouton Android/Chrome -->
    <button id="pwa-install-btn-card" style="

    <button id="pwa-ios-btn-card" style="
      display:none;

<!-- Chargement de l'application React (fichier externe) -->
<script src="./app.js" defer></script>

<!-- ==================== PWA : Gestion installation ==================== -->
<script>
(function () {
  const card = document.getElementById('pwa-install-card');
  const btnAndroid = document.getElementById('pwa-install-btn-card');
  const btnIOS = document.getElementById('pwa-ios-btn-card');
  const iosSteps = document.getElementById('pwa-ios-steps');
  const dismissBtn = document.getElementById('pwa-card-dismiss');

  // Détection plateforme
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches
                    || window.navigator.standalone === true;
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

  // Si déjà installée, ne rien afficher
  if (isStandalone) return;

  let deferredPrompt = null;

  // Android / Chrome : attendre l'événement beforeinstallprompt
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    btnAndroid.style.display = 'inline-block';
    card.style.display = 'block';
  });

  // iOS Safari : afficher le bouton "Comment ?" immédiatement
  if (isIOS && isSafari) {
    btnIOS.style.display = 'inline-block';
    card.style.display = 'block';
  }

  // Clic bouton Android → déclencher le prompt natif
  btnAndroid.addEventListener('click', () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(choice => {
      console.log('[PWA] Installation :', choice.outcome);
      deferredPrompt = null;
      if (choice.outcome === 'accepted') {
        card.style.display = 'none';
      }
    });
  });

  // Clic bouton iOS → afficher/masquer les instructions
  btnIOS.addEventListener('click', () => {
    iosSteps.style.display = iosSteps.style.display === 'none' ? 'block' : 'none';
  });

  // Fermer la carte
  dismissBtn.addEventListener('click', () => {
    card.style.display = 'none';
  });

  // Une fois installée (standalone), masquer
  window.matchMedia('(display-mode: standalone)').addEventListener('change', (e) => {
    if (e.matches) card.style.display = 'none';
  });

  // Enregistrement du Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('[SW] enregistré', reg.scope))
        .catch(err => console.warn('[SW] erreur', err));
    });
  }

  // Rechargement auto après mise à jour SW
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (refreshing) return;
    refreshing = true;
    window.location.reload();
  });
})();
</script>
